# docker compose up -d --build
# docker compose down

# Our entire services (containers)
services:

  # MySQL service: 
  mysql-service:
    image: mysql:8
    container_name: mysql-container
    environment:
      MYSQL_HOST: localhost
      MYSQL_DATABASE: vacation_app
      MYSQL_ROOT_PASSWORD: "5E84dfdf!"

    volumes:
      - mysql-volume:/var/lib/mysql
      - ./Database:/docker-entrypoint-initdb.d

    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# ---------------------------------------------------------------------------------------------------

  # Our backend service:
  backend-service:
    depends_on:
      mysql-service:
        condition: service_healthy

    build:
      context: .
      dockerfile: ./Backend/Dockerfile
    
    image: vacation-backend-image:1.0
    container_name: backend-container

    environment:
      ENVIRONMENT: "production"
      PORT: 4000
      MYSQL_HOST: mysql-service
      MYSQL_USER: root
      MYSQL_PASSWORD: "5E84dfdf!"
      MYSQL_DATABASE: vacation_app
      HASH_SALT: "TheAmazing45800-3Students"
      JWT_SECRET: "neon-dragon_🚀_midnight-cipher__vault42__cosmicEntropy__jwtPowerCore__9fA7xKQwLZpR8M2eT0VhS"
      CHAT_GPT_API_KEY: "your_openai_api_key_here"
      MCP_SERVER_URL: "https://physiologically-curial-lakesha.ngrok-free.dev/sse"
      IMAGES_BASE_URL: "http://localhost:4000/api/vacations/images"

    ports:
      - 4000:4000

    volumes:
      - images-volume:/app/src/1-assets/images

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "--eval", "require('http').get('http://localhost:4000/', response => process.exit(response.statusCode === 404 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# ---------------------------------------------------------------------------------------------------

  # Our frontend website: 
  frontend-service:
    depends_on:
      backend-service:
        condition: service_healthy

    build:
      context: .
      dockerfile: ./Frontend/Dockerfile

    image: vacation-frontend-image:1.0
    container_name: frontend-container

    ports:
      - 80:5173

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "--eval", "require('http').get('http://localhost:5173', response => process.exit(response.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# ---------------------------------------------------------------------------------------------------

volumes:
  mysql-volume:
  images-volume:
